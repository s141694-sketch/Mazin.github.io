<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة التحكم — منصة المهارات التدريبية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#F7F4ED;font-family:'Readex Pro',sans-serif;color:#1B2333;}
.wrap{max-width:640px;margin:0 auto;padding:56px 24px;}
.card{background:#FFFFFF;border:1px solid #E5DFD2;border-radius:18px;padding:28px;margin-bottom:20px;}
h1{font-family:'Alexandria',sans-serif;font-size:26px;margin:0 0 20px;}
input{width:100%;box-sizing:border-box;border:1px solid #E5DFD2;border-radius:12px;padding:12px 16px;font-size:15px;margin-bottom:12px;font-family:'Readex Pro',sans-serif;}
button{border:none;cursor:pointer;background:#17233C;color:#FFFFFF;font-weight:700;font-size:15px;padding:12px 24px;border-radius:12px;width:100%;}
.error{color:#A33C3C;font-size:13.5px;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0EBE0;font-size:14.5px;}
a.link{color:#0E6E63;text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div dir="rtl" class="wrap">
<h1>لوحة التحكم</h1>

<div id="authBox" class="card">
<div id="loginForm">
<div id="err" class="error"></div>
<input id="email" type="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">
<button id="loginBtn">تسجيل الدخول</button>
<button id="signupBtn" style="background:transparent;color:#17233C;border:1px solid #E5DFD2;margin-top:10px;">إنشاء حساب جديد</button>
</div>
</div>

<div id="dashBox" class="card" style="display:none;">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
<div id="welcome" style="font-weight:700;"></div>
<button id="logoutBtn" style="width:auto;background:transparent;color:#A33C3C;border:1px solid #E5DFD2;padding:8px 16px;">تسجيل الخروج</button>
</div>
<div class="row"><span>نسبة الإنجاز الكلية</span><b id="totalPct">—</b></div>
<div class="row"><span>اختبار الدرس الأول</span><b id="q1">—</b></div>
<div class="row"><span>اختبار الدرس الثاني</span><b id="q2">—</b></div>
<div class="row"><span>لعبة المعوقات</span><b id="gameScore">—</b></div>
<p style="margin-top:20px;"><a class="link" href="./منصة المهارات التدريبية.dc.html">← العودة إلى المنصة التدريبية</a></p>
</div>
</div>

<script type="module">
import { watchAuth, logIn, signUp, logOut } from "./auth.js";
import { loadProgress } from "./db.js";

const $ = (id) => document.getElementById(id);

$("loginBtn").onclick = async () => {
  try { await logIn($("email").value, $("password").value); }
  catch (e) { $("err").textContent = e.message; }
};
$("signupBtn").onclick = async () => {
  try { await signUp($("email").value, $("password").value); }
  catch (e) { $("err").textContent = e.message; }
};
$("logoutBtn").onclick = () => logOut();

watchAuth(async (user) => {
  if (user) {
    $("authBox").style.display = "none";
    $("dashBox").style.display = "block";
    $("welcome").textContent = "مرحبًا، " + user.email;
    const data = await loadProgress(user.uid);
    if (data) {
      const l1s = data.steps?.l1 || {};
      const l2s = data.steps?.l2 || {};
      const vals = [...Object.values(l1s), ...Object.values(l2s)];
      const pct = vals.length ? Math.round(vals.filter(Boolean).length / vals.length * 100) : 0;
      $("totalPct").textContent = pct + "%";
      $("q1").textContent = data.qs?.l1 ? data.qs.l1.score + "/" + data.qs.l1.total : "—";
      $("q2").textContent = data.qs?.l2 ? data.qs.l2.score + "/" + data.qs.l2.total : "—";
      $("gameScore").textContent = (data.gameScore ?? "—") + "/8";
    }
  } else {
    $("authBox").style.display = "block";
    $("dashBox").style.display = "none";
  }
});
</script>
</body>
</html>
